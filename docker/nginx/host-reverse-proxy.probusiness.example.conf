# Migración: intranetback.probusiness.pe (PROD) — Nginx en el HOST → Docker
#
# Antes: root + fastcgi_pass unix:.../php7.4-fpm.sock
# Ahora: proxy_pass al contenedor nginx (docker-compose APP_PORT, ej. 8081 en prod)
#
# En /var/www/html/intranet_back/.env:
#   APP_PORT=8081
#   COMPOSE_PROJECT_NAME=intranet_prod
#
# Certbot / SSL siguen en este archivo del host (no en el contenedor).

server {
    if ($host = intranetback.probusiness.pe) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name intranetback.probusiness.pe;
}

server {
    listen 443 ssl http2;
    server_name intranetback.probusiness.pe;

    client_max_body_size 700M;
    client_body_timeout 3000s;
    client_header_timeout 300s;

    error_log /var/log/nginx/intranetback_error.log;
    access_log /var/log/nginx/intranetback_access.log;
    ssl_certificate /etc/letsencrypt/live/intranetback.probusiness.pe/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/intranetback.probusiness.pe/privkey.pem;

    # --- API Laravel (PHP dentro de Docker) ---
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
    }

    # Webhooks Bitrix (misma ruta, pasa al contenedor)
    location /api/bitrix/webhook {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- WebSockets PROD: puerto 6001 (contenedor websockets / Reverb del compose) ---
    location ^~ /app/ {
        proxy_pass http://127.0.0.1:6001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    location ^~ /laravel-websockets {
        proxy_pass http://127.0.0.1:6001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

