# Ejemplo: Nginx en el HOST (fuera de Docker) como reverse proxy al contenedor.
# QA  → proxy_pass http://127.0.0.1:8080;
# PROD → proxy_pass http://127.0.0.1:8081;  (otro APP_PORT en .env del clone prod)
#
# Instalar en el servidor, p. ej.:
#   /etc/nginx/sites-available/intranet-api-qa.conf

server {
    listen 80;
    server_name api-qa.tudominio.com;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}
