# QA: qa.intranetback.probusiness.pe — Nginx en el HOST → Docker (puerto 8085)
#
# Instalar en el servidor:
#   sudo cp docker/nginx/host-reverse-proxy.probusiness-qa.example.conf \
#          /etc/nginx/conf.d/qa.intranetback.probusiness.pe.conf
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot install --cert-name qa.intranetback.probusiness.pe
#   # o si el cert ya existe (certonly antes):
#   sudo certbot --nginx -d qa.intranetback.probusiness.pe
#
# En /var/www/html/intranet_back_qa/.env:
#   APP_ENV=qa
#   APP_URL=https://qa.intranetback.probusiness.pe
#   APP_PORT=8085
#   COMPOSE_PROJECT_NAME=intranet_qa
#   HORIZON_PREFIX=qa_horizon:
#   REDIS_PREFIX=qa_
#   WHATSAPP_USE_DEFAULT_NUMBER=true

server {
    if ($host = qa.intranetback.probusiness.pe) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name qa.intranetback.probusiness.pe;
}

server {
    listen 443 ssl http2;
    server_name qa.intranetback.probusiness.pe;

    client_max_body_size 700M;
    client_body_timeout 3000s;
    client_header_timeout 300s;

    error_log /var/log/nginx/intranetback_qa_error.log;
    access_log /var/log/nginx/intranetback_qa_access.log;
    ssl_certificate /etc/letsencrypt/live/qa.intranetback.probusiness.pe/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qa.intranetback.probusiness.pe/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- API Laravel (clone QA en Docker, puerto 8085) ---
    location / {
        proxy_pass http://127.0.0.1:8085;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
    }

    location /api/bitrix/webhook {
        proxy_pass http://127.0.0.1:8085;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Horizon dashboard (opcional restringir por IP en QA)
    location /horizon {
        proxy_pass http://127.0.0.1:8085;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- WebSockets QA: puerto distinto al de PROD (6002 vs 6001) ---
    location /app/ {
        proxy_pass http://127.0.0.1:6002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    location /laravel-websockets {
        proxy_pass http://127.0.0.1:6002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
