# Stack base para servidor (QA/PROD). PHP 8.2 va dentro del contenedor — no instalar PHP en el host.
#
# Servidor (MySQL en host, bind-address=127.0.0.1):
#   docker compose -f docker-compose.yml -f docker-compose.host-mysql.yml up -d --build
#   .env → DB_HOST=localhost, DB_SOCKET=/var/run/mysqld/mysqld.sock
#
# Local con MySQL en contenedor:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build

name: intranet_back

# Variables Redis para contenedores PHP (pisan REDIS_CLIENT=redis inválido del .env en runtime)
x-docker-redis-env: &docker-redis-env
  REDIS_CLIENT: phpredis
  REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
  REDIS_PORT: ${DOCKER_REDIS_PORT:-6379}

# www-data no puede escribir en /var/www/.config (psysh/tinker)
x-docker-php-env: &docker-php-env
  <<: *docker-redis-env
  XDG_CONFIG_HOME: /tmp

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    image: intranet_back-app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-production}
      <<: *docker-php-env
      # Laravel → publicar eventos al contenedor websockets (puerto desde .env)
      PUSHER_HOST: ${DOCKER_PUSHER_HOST:-websockets}
      PUSHER_PORT: ${LARAVEL_WEBSOCKETS_PORT}
      PUSHER_SCHEME: http
      LARAVEL_WEBSOCKETS_PORT: ${LARAVEL_WEBSOCKETS_PORT}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started
    networks:
      - intranet

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - intranet

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - intranet

  horizon:
    image: intranet_back-app
    restart: unless-stopped
    user: www-data
    command: php artisan horizon
    volumes:
      - .:/var/www/html
    environment:
      <<: *docker-php-env
      APP_ENV: ${APP_ENV:-production}
      QUEUE_CONNECTION: redis
    depends_on:
      - app
      - redis
    networks:
      - intranet

  scheduler:
    image: intranet_back-app
    restart: unless-stopped
    user: www-data
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction;
        sleep 60;
      done"
    volumes:
      - .:/var/www/html
    environment:
      <<: *docker-php-env
      APP_ENV: ${APP_ENV:-production}
    depends_on:
      - app
    networks:
      - intranet

  # Laravel WebSockets.
  # QA .env: LARAVEL_WEBSOCKETS_PORT=6002 | PROD .env: LARAVEL_WEBSOCKETS_PORT=6001
  websockets:
    image: intranet_back-app
    restart: unless-stopped
    user: www-data
    # --port explícito: evita config:cache con 6001 (prod) y bind en 0.0.0.0 para Docker
    command: php artisan websockets:serve --host=0.0.0.0 --port=${LARAVEL_WEBSOCKETS_PORT}
    ports:
      - "127.0.0.1:${LARAVEL_WEBSOCKETS_PORT}:${LARAVEL_WEBSOCKETS_PORT}"
    volumes:
      - .:/var/www/html
    environment:
      <<: *docker-php-env
      LARAVEL_WEBSOCKETS_PORT: ${LARAVEL_WEBSOCKETS_PORT}
      PUSHER_HOST: 0.0.0.0
      PUSHER_PORT: ${LARAVEL_WEBSOCKETS_PORT}
      PUSHER_SCHEME: http
    depends_on:
      - app
      - redis
    networks:
      - intranet

networks:
  intranet:
    driver: bridge
