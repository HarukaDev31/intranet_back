name: CI

on:
  push:
    # qa: CI corre dentro de deploy-qa.yml (evita duplicar tests en cada push)
    branches: [main, 'upgrade/**']
  pull_request:
    branches: [qa, main]
  workflow_call:
    inputs:
      quick:
        description: 'Smoke only (omitir PHPUnit) — deploy QA'
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, redis, gd, zip, bcmath, intl, pcntl, soap, exif
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare Laravel
        env:
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:clear

      - name: Smoke check (about + routes)
        env:
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: |
          php artisan about --only=environment,cache,drivers
          # L9 no tiene --compact ni --columns; --json valida que todas las rutas resuelven
          php artisan route:list --except-vendor --json > /tmp/routes.json
          test -s /tmp/routes.json

      - name: Run unit tests
        if: ${{ github.event_name != 'workflow_call' || inputs.quick != true }}
        env:
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: vendor/bin/phpunit --testsuite=Unit --exclude-group integration,requires-db

      - name: Run feature tests
        if: ${{ github.event_name != 'workflow_call' || inputs.quick != true }}
        env:
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        continue-on-error: true
        run: vendor/bin/phpunit --testsuite=Feature --exclude-group integration,requires-db
