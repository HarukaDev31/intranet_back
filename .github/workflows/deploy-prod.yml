name: Deploy PROD

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribe "deploy" para confirmar'
        required: true
        type: string
      git_branch:
        description: 'Rama a desplegar en PROD'
        required: false
        default: 'main'
        type: string
      composer_clean:
        description: 'Borrar vendor/ antes de composer install (upgrades Laravel)'
        required: false
        default: false
        type: boolean
      run_migrations:
        description: 'Ejecutar migrate --force'
        required: false
        default: true
        type: boolean

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.confirm == 'deploy'

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.PROD_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then DEPLOY_PATH="/var/www/html/intranet_back"; fi

            GIT_BRANCH="${{ github.event.inputs.git_branch }}"
            if [ -z "$GIT_BRANCH" ]; then GIT_BRANCH="main"; fi

            DEPLOY_MODE="${{ vars.PROD_DEPLOY_MODE }}"
            if [ -z "$DEPLOY_MODE" ]; then DEPLOY_MODE="docker"; fi

            COMPOSER_CLEAN="false"
            if [ "${{ github.event.inputs.composer_clean }}" = "true" ]; then
              COMPOSER_CLEAN="true"
            elif [ "${{ vars.PROD_COMPOSER_CLEAN }}" = "true" ]; then
              COMPOSER_CLEAN="true"
            fi

            RUN_MIGRATIONS="true"
            if [ "${{ github.event.inputs.run_migrations }}" = "false" ]; then
              RUN_MIGRATIONS="false"
            fi

            export DEPLOY_PATH
            export GIT_BRANCH
            export DEPLOY_MODE
            export COMPOSER_CLEAN
            export RUN_MIGRATIONS

            sudo git config --global --add safe.directory "${DEPLOY_PATH}" || true
            sudo git config --global --add safe.directory '*' || true

            echo "[deploy-prod] path=${DEPLOY_PATH} branch=${GIT_BRANCH} mode=${DEPLOY_MODE} composer_clean=${COMPOSER_CLEAN}"
            sudo -E env DEPLOY_PATH="${DEPLOY_PATH}" GIT_BRANCH="${GIT_BRANCH}" DEPLOY_MODE="${DEPLOY_MODE}" \
              COMPOSER_CLEAN="${COMPOSER_CLEAN}" RUN_MIGRATIONS="${RUN_MIGRATIONS}" DEPLOY_USE_SUDO=false \
              bash "${DEPLOY_PATH}/scripts/deploy.sh"
